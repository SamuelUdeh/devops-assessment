apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: assessment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          command: ["redis-server"]
          args:
            - "--maxmemory"
            - "200mb"
            - "--maxmemory-policy"
            - "allkeys-lru"  
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: assessment
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
